kind = "web"
previewPath = "/"
title = "RGB Spinner Builder"
version = "1.0.0"
id = "artifacts/rgb-spinner-builder"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23431

[services.development]
run = "pnpm --filter @workspace/rgb-spinner-builder run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rgb-spinner-builder", "run", "build" ]
publicDir = "artifacts/rgb-spinner-builder/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23431"
BASE_PATH = "/"
